# ============================================
# EfficientNet-B0 Fine-Tuning — Food-101
# ============================================
# Modern efficient architecture. Shows you know
# architectures beyond ResNet.
# Goal: ~87-90% accuracy.
# ============================================

# --- Experiment ---
experiment:
  name: "efficientnet_b0_finetune_food101"
  project: "tier1-image-classification"
  tags: ["efficientnet", "transfer-learning", "food101", "finetune"]
  seed: 42

# --- Dataset ---
data:
  dataset: "food101"
  data_dir: "./data"
  num_classes: 101
  image_size: 224
  batch_size: 64
  num_workers: 4
  pin_memory: true

# --- Augmentation ---
augmentation:
  random_horizontal_flip: true
  random_crop: true
  random_crop_padding: 4
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.3
    hue: 0.1
  random_erasing: true
  random_erasing_prob: 0.25
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  mixup:
    enabled: true
    alpha: 0.2
  cutmix:
    enabled: true
    alpha: 1.0
  mix_prob: 0.5

# --- Model ---
model:
  type: "transfer_learning"
  backbone: "efficientnet_b0"
  pretrained: true
  freeze_backbone: false
  finetune_strategy: "gradual_unfreeze"
  unfreeze_schedule:
    - epoch: 0
      layers: ["classifier"]
    - epoch: 3
      layers: ["features.7", "features.8", "classifier"]
    - epoch: 7
      layers: ["features.5", "features.6", "features.7", "features.8", "classifier"]
    - epoch: 12
      layers: "all"

# --- Training ---
training:
  epochs: 50
  optimizer:
    type: "adamw"
    lr: 0.0003
    weight_decay: 0.01
    betas: [0.9, 0.999]
  discriminative_lr:
    enabled: true
    backbone_lr_factor: 0.1
  scheduler:
    type: "cosine_annealing"
    T_max: 50
    eta_min: 0.000001
  warmup:
    enabled: true
    epochs: 3
    start_lr: 0.00001
  gradient_clip: 1.0
  mixed_precision: true
  label_smoothing: 0.1

# --- Callbacks ---
callbacks:
  early_stopping:
    enabled: true
    patience: 10
    monitor: "val_accuracy"
    mode: "max"
  checkpoint:
    save_best: true
    save_last: true
    monitor: "val_accuracy"
    mode: "max"
    dirpath: "./results/checkpoints"

# --- Logging ---
logging:
  wandb:
    enabled: true
    project: "tier1-image-classification"
    entity: null
  log_interval: 10
  log_images: true
  log_gradients: false
